version: "3.8"

services:
  backend:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env   # 🔥 VERY IMPORTANT
    volumes:
      - .:/app

  worker:
    build: .
    command: node src/worker.js
    depends_on:
      - redis
      - postgres
    env_file:
      - .env   # 🔥 VERY IMPORTANT
    volumes:
      - .:/app

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: